<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Film Archive</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg:       #0e0c09;
    --surface:  #1a1710;
    --card:     #221f18;
    --border:   #35301f;
    --accent:   #c8a45a;
    --accent2:  #e8c97a;
    --text:     #e8e0cc;
    --muted:    #7a7260;
    --radius:   6px;
    --film-strip: repeating-linear-gradient(
      90deg, #0e0c09 0px, #0e0c09 6px, transparent 6px, transparent 14px
    );
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }

  /* ── Header ── */
  header { border-bottom: 1px solid var(--border); padding: 0 2rem; background: var(--surface); position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 2rem; height: 64px; flex-wrap: wrap; }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: var(--accent); white-space: nowrap; letter-spacing: 0.03em; }
  .logo span { font-style: italic; color: var(--accent2); }
  .header-stats { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); display: flex; gap: 1.5rem; }
  .header-stats b { color: var(--accent); font-weight: 400; }
  .header-tools { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; }
  .tool-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.65rem; padding: 0.3rem 0.65rem; cursor: pointer; letter-spacing: 0.04em; transition: all 0.15s; white-space: nowrap; }
  .tool-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tool-btn.primary { border-color: var(--accent); color: var(--accent); }
  .tool-btn.primary:hover { background: var(--accent); color: #000; }
  #import-file { display: none; }
  .search-wrap { position: relative; }
  #search { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 0.4rem 0.8rem 0.4rem 2rem; font-family: 'DM Mono', monospace; font-size: 0.75rem; width: 220px; outline: none; transition: border-color 0.2s; }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 0.5rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.8rem; pointer-events: none; }

  /* ── Layout ── */
  .layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 64px); }
  aside { background: var(--surface); border-right: 1px solid var(--border); padding: 1.5rem 0; position: sticky; top: 64px; height: calc(100vh - 64px); overflow-y: auto; }
  .sidebar-heading { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); padding: 0 1.25rem 0.75rem; }
  .era-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; text-align: left; padding: 0.5rem 1.25rem; background: none; border: none; cursor: pointer; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 300; border-left: 2px solid transparent; transition: all 0.15s; }
  .era-btn:hover { background: var(--card); color: var(--accent2); }
  .era-btn.active { border-left-color: var(--accent); background: var(--card); color: var(--accent); }
  .era-count { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); background: var(--bg); padding: 0.1rem 0.4rem; border-radius: 10px; }
  main { padding: 2rem; overflow-y: auto; }

  /* ── Era sections ── */
  .era-section { margin-bottom: 3rem; scroll-margin-top: 80px; }
  .era-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
  .era-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--accent2); font-style: italic; }
  .era-folder { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); }
  .era-video-count { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); }

  /* ── Description panel ── */
  .era-desc-panel { margin-bottom: 1.25rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--card); overflow: hidden; transition: border-color 0.2s; }
  .era-desc-panel:focus-within { border-color: var(--accent); }
  .era-desc-view { padding: 0.85rem 1rem; min-height: 3.5rem; cursor: text; }
  .era-desc-text { font-size: 0.875rem; line-height: 1.65; color: var(--text); white-space: pre-wrap; }
  .era-desc-placeholder { font-size: 0.8rem; color: var(--muted); font-style: italic; display: flex; align-items: center; gap: 0.5rem; }
  .era-desc-placeholder::before { content: '✎'; font-style: normal; }
  .era-desc-edit-area { display: none; flex-direction: column; }
  .era-desc-edit-area.active { display: flex; }
  .era-desc-view.hidden { display: none; }
  .era-desc-textarea { background: transparent; border: none; outline: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.875rem; line-height: 1.65; font-weight: 300; padding: 0.85rem 1rem 0.5rem; resize: none; min-height: 80px; width: 100%; }
  .era-desc-textarea::placeholder { color: var(--muted); font-style: italic; }
  .era-desc-toolbar { display: flex; align-items: center; justify-content: flex-end; gap: 0.5rem; padding: 0.4rem 0.75rem; border-top: 1px solid var(--border); background: var(--surface); }
  .desc-save-btn, .desc-cancel-btn { font-family: 'DM Mono', monospace; font-size: 0.65rem; padding: 0.25rem 0.65rem; border-radius: var(--radius); cursor: pointer; letter-spacing: 0.04em; transition: all 0.15s; border: 1px solid; }
  .desc-save-btn { background: var(--accent); color: #000; border-color: var(--accent); }
  .desc-save-btn:hover { background: var(--accent2); }
  .desc-cancel-btn { background: none; color: var(--muted); border-color: var(--border); }
  .desc-cancel-btn:hover { color: var(--text); }
  .desc-saved-flash { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--accent); opacity: 0; transition: opacity 0.3s; margin-right: auto; }
  .desc-saved-flash.show { opacity: 1; }

  /* ── Video grid ── */
  .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
  .video-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s; }
  .video-card:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .film-strip { height: 10px; background: var(--film-strip), #111; border-bottom: 1px solid #000; }
  .preview-reel { position: relative; height: 140px; overflow: hidden; background: #111; }
  .preview-reel img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.3s; }
  .preview-reel img.active { opacity: 1; }
  .preview-dots { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; }
  .preview-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; transition: background 0.2s; }
  .preview-dot.active { background: var(--accent); }
  .play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; background: rgba(0,0,0,0.4); }
  .video-card:hover .play-overlay { opacity: 1; }
  .play-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; color: #000; font-size: 1rem; }
  .card-body { padding: 0.75rem 0.9rem; }
  .card-label { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--accent); margin-bottom: 0.25rem; }
  .card-filename { font-size: 0.75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { display: flex; justify-content: space-between; margin-top: 0.5rem; font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); gap: 0.5rem; flex-wrap: wrap; }
  .card-size { color: var(--muted); }
  .card-duration { color: var(--accent2); }
  .card-format { font-size: 0.55rem; padding: 0.1rem 0.35rem; border-radius: 3px; background: var(--border); color: var(--muted); letter-spacing: 0.05em; }
  .card-format.mp4 { background: #1a3020; color: #6dbf85; }
  .open-btn { display: block; width: calc(100% - 1.8rem); margin: 0 0.9rem 0.75rem; padding: 0.4rem; background: none; border: 1px solid var(--border); border-radius: var(--radius); color: var(--accent); font-family: 'DM Mono', monospace; font-size: 0.65rem; cursor: pointer; text-align: center; transition: background 0.15s, border-color 0.15s; letter-spacing: 0.05em; }
  .open-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
  .open-btn:disabled { opacity: 0.4; cursor: wait; }

  /* ── Loading overlay ── */
  /* ── Modal ── */
  .modal-backdrop { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.88); align-items: center; justify-content: center; flex-direction: column; gap: 1rem; padding: 2rem; }
  .modal-backdrop.open { display: flex; }
  .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; width: 100%; max-width: 960px; box-shadow: 0 32px 80px rgba(0,0,0,0.7); display: flex; flex-direction: column; }
  .modal-header { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); background: var(--card); }
  .modal-era { font-family: 'Playfair Display', serif; font-style: italic; color: var(--accent2); font-size: 0.9rem; }
  .modal-label { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); }
  .modal-filename { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); margin-left: auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1.2rem; padding: 0.2rem 0.4rem; border-radius: 4px; transition: color 0.15s, background 0.15s; flex-shrink: 0; }
  .modal-close:hover { color: var(--text); background: var(--border); }
  .modal-ext { color: var(--muted); font-size: 0.9rem; text-decoration: none; padding: 0.2rem 0.4rem; border-radius: 4px; transition: color 0.15s; flex-shrink: 0; }
  .modal-ext:hover { color: var(--accent); }
  .modal-video-wrap { background: #000; display: flex; align-items: center; justify-content: center; min-height: 300px; position: relative; }
  .modal-spinner { position: absolute; font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); display: none; }
  .modal-footer { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; border-top: 1px solid var(--border); background: var(--card); }
  .modal-nav-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius); color: var(--accent); font-family: 'DM Mono', monospace; font-size: 0.65rem; padding: 0.3rem 0.75rem; cursor: pointer; transition: background 0.15s; letter-spacing: 0.05em; }
  .modal-nav-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
  .modal-nav-btn:disabled { opacity: 0.3; cursor: default; }
  .modal-nav-btn:disabled:hover { background: none; color: var(--accent); border-color: var(--border); }
  .modal-counter { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); margin: 0 auto; }
  .modal-unsupported { padding: 2rem; text-align: center; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.75rem; display: none; }
  .modal-unsupported a { color: var(--accent); text-decoration: none; }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--card); border: 1px solid var(--accent); border-radius: var(--radius); padding: 0.6rem 1.1rem; font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--accent); z-index: 2000; opacity: 0; transform: translateY(8px); transition: opacity 0.25s, transform 0.25s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .no-results { text-align: center; padding: 4rem; color: var(--muted); font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

<header>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Search eras or files…">
  </div>
</header>

<div class="toast" id="toast"></div>

<div class="layout">

  <main id="main-content"><div id="library-content"></div></main>
</div>

<!-- Modal player -->
<div class="modal-backdrop" id="modal" onclick="handleBackdropClick(event)">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-era" id="modal-era"></span>
      <span class="modal-label" id="modal-label"></span>
      <span class="modal-filename" id="modal-filename"></span>
      <a class="modal-ext" id="modal-ext-link" href="#" target="_blank" title="Open in new tab">↗</a>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-video-wrap" id="modal-video-wrap">
      <video id="modal-video" controls autoplay playsinline
             style="width:100%;max-height:70vh;display:block;outline:none;background:#000">
      </video>
      <div class="modal-unsupported" id="modal-unsupported">
        <p>⚠ Could not load video.</p>
        <p style="margin-top:0.5rem">
          <a id="modal-ext-link2" href="#" target="_blank">Open directly ↗</a>
        </p>
      </div>
    </div>
    <div class="modal-footer">
      <button class="modal-nav-btn" id="btn-prev" onclick="navModal(-1)">← Prev</button>
      <span class="modal-counter" id="modal-counter"></span>
      <button class="modal-nav-btn" id="btn-next" onclick="navModal(1)">Next →</button>
    </div>
  </div>
</div>

// ── Render sidebar ────────────────────────────────────────────────────────────
function renderSidebar(data) {
  document.getElementById('sidebar-nav').innerHTML = data.map(g => `
    <button class="era-btn" data-era="${g.folder}" onclick="scrollToEra('${g.folder}')">
      <span>${g.era}</span><span class="era-count">${g.video_count}</span>
    </button>`).join('');
}

// ── Render library ────────────────────────────────────────────────────────────
function renderLibrary(data) {
  const container = document.getElementById('library-content');
  if (!data.length) { container.innerHTML = '<div class="no-results">No matching videos found.</div>'; return; }
  container.innerHTML = data.map(group => `
    <section class="era-section" id="era-${group.folder}">
      <div class="era-header">
        <h2 class="era-title">${group.era}</h2>
        <span class="era-folder">${group.folder}/</span>
        <span class="era-video-count">${group.video_count} video${group.video_count !== 1 ? 's' : ''}</span>
      </div>
      <div class="era-desc-panel" id="desc-panel-${CSS.escape(group.folder)}">
        <div class="era-desc-view" id="desc-view-${CSS.escape(group.folder)}" onclick="startEditDesc('${encodeURIComponent(group.folder)}')">
          <div class="era-desc-text" id="desc-text-${CSS.escape(group.folder)}"></div>
          <div class="era-desc-placeholder" id="desc-placeholder-${CSS.escape(group.folder)}">Add a description for this DVD…</div>
        </div>
        <div class="era-desc-edit-area" id="desc-edit-${CSS.escape(group.folder)}">
          <textarea class="era-desc-textarea" id="desc-ta-${CSS.escape(group.folder)}"
            placeholder="Describe what's on this DVD — people, places, events, dates…"
            oninput="autoResize(this)"></textarea>
          <div class="era-desc-toolbar">
            <span class="desc-saved-flash" id="desc-flash-${CSS.escape(group.folder)}">✓ Saved</span>
            <button class="desc-cancel-btn" onclick="cancelEditDesc('${encodeURIComponent(group.folder)}')">Cancel</button>
            <button class="desc-save-btn" onclick="saveDesc('${encodeURIComponent(group.folder)}')">Save</button>
          </div>
        </div>
      </div>
      <div class="video-grid">${group.videos.map(v => renderCard(v, group)).join('')}</div>
    </section>`).join('');
  initPreviewRotators();
  data.forEach(g => populateDesc(g.folder));
}

function renderCard(v, group) {
  const previewImgs = v.preview_urls.map((url, i) =>
    `<img src="${url}" class="${i===0?'active':''}" alt="Preview ${i+1}">`).join('');
  const dots = v.preview_urls.map((_, i) =>
    `<span class="preview-dot ${i===0?'active':''}" data-idx="${i}"></span>`).join('');
  const fmt = v.format ? `<span class="card-format ${v.format.toLowerCase()}">${v.format}</span>` : '';

  return `
    <div class="video-card" data-group="${encodeURIComponent(group.folder)}" data-videourl="${encodeURIComponent(v.video_url)}">
      <div class="film-strip"></div>
      <div class="preview-reel">
        ${v.preview_urls.length ? previewImgs : '<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#333;font-size:2rem">▶</div>'}
        <div class="play-overlay" onclick="openModal(decodeURIComponent(this.closest('.video-card').dataset.group), decodeURIComponent(this.closest('.video-card').dataset.videourl))">
          <div class="play-btn">▶</div>
        </div>
        ${v.preview_urls.length > 1 ? `<div class="preview-dots">${dots}</div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-label">${v.label}</div>
        <div class="card-filename">${v.filename}</div>
        <div class="card-meta">
          <span class="card-size">${v.size_mb} MB</span>
          ${fmt}
        </div>
      </div>
      <button class="open-btn"
        onclick="openModal(decodeURIComponent(this.closest('.video-card').dataset.group), decodeURIComponent(this.closest('.video-card').dataset.videourl))">
        ▶ Play Video
      </button>
    </div>`;
}

let modalGroup = null;
let modalIdx   = 0;

function openModal(folderName, videoUrl) {
  const group = LIBRARY.find(g => g.folder === folderName);
  if (!group) return;
  const idx = group.videos.findIndex(v => v.video_url === videoUrl);
  if (idx === -1) return;
  modalGroup = group;
  modalIdx   = idx;
  showModalVideo();
  document.getElementById('modal').classList.add('open');
  document.addEventListener('keydown', modalKeyHandler);
}

function showModalVideo() {
  const v     = modalGroup.videos[modalIdx];
  const vid   = document.getElementById('modal-video');
  const unsup = document.getElementById('modal-unsupported');

  document.getElementById('modal-era').textContent      = modalGroup.era;
  document.getElementById('modal-label').textContent    = v.label;
  document.getElementById('modal-filename').textContent = v.filename;
  document.getElementById('modal-counter').textContent  =
    `${modalIdx + 1} / ${modalGroup.videos.length}`;
  document.getElementById('btn-prev').disabled = modalIdx === 0;
  document.getElementById('btn-next').disabled = modalIdx === modalGroup.videos.length - 1;

  unsup.style.display = 'none';
  vid.style.display   = 'block';

  if (!v.video_url) {
    vid.style.display   = 'none';
    unsup.style.display = 'block';
    return;
  }

  document.getElementById('modal-ext-link').href  = v.video_url;
  document.getElementById('modal-ext-link2').href = v.video_url;

  vid.src = v.video_url;
  vid.load();
  vid.onerror = () => {
    vid.style.display   = 'none';
    unsup.style.display = 'block';
  };
  vid.play().catch(() => {});
}

function closeModal() {
  const vid = document.getElementById('modal-video');
  vid.pause();
  vid.src = '';
  document.getElementById('modal').classList.remove('open');
  document.removeEventListener('keydown', modalKeyHandler);
}

function navModal(dir) {
  const next = modalIdx + dir;
  if (next < 0 || next >= modalGroup.videos.length) return;
  const vid = document.getElementById('modal-video');
  vid.pause();
  vid.src = '';
  modalIdx = next;
  showModalVideo();
}

function handleBackdropClick(e) { if (e.target.id === 'modal') closeModal(); }
function modalKeyHandler(e) {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowRight') navModal(1);
  if (e.key === 'ArrowLeft')  navModal(-1);
}

// ── Preview rotators ──────────────────────────────────────────────────────────
function initPreviewRotators() {
  document.querySelectorAll('.preview-reel').forEach(reel => {
    const imgs = reel.querySelectorAll('img');
    const dots = reel.querySelectorAll('.preview-dot');
    if (imgs.length <= 1) return;
    let current = 0, timer = null;
    function show(idx) {
      imgs[current].classList.remove('active');
      if (dots[current]) dots[current].classList.remove('active');
      current = idx;
      imgs[current].classList.add('active');
      if (dots[current]) dots[current].classList.add('active');
    }
    reel.closest('.video-card').addEventListener('mouseenter', () => {
      timer = setInterval(() => show((current+1) % imgs.length), 800);
    });
    reel.closest('.video-card').addEventListener('mouseleave', () => {
      clearInterval(timer); show(0);
    });
    dots.forEach(dot => dot.addEventListener('click', e => {
      e.stopPropagation(); show(parseInt(dot.dataset.idx));
    }));
  });
}

// ── Scroll / sidebar ──────────────────────────────────────────────────────────
function scrollToEra(folder) {
  document.querySelectorAll('.era-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.era-btn[data-era="${folder}"]`);
  if (btn) btn.classList.add('active');
  document.getElementById(`era-${folder}`)?.scrollIntoView({behavior:'smooth'});
}

document.getElementById('main-content').addEventListener('scroll', () => {
  let active = null;
  document.querySelectorAll('.era-section').forEach(s => {
    if (s.getBoundingClientRect().top < 120) active = s.id.replace('era-','');
  });
  if (active) {
    document.querySelectorAll('.era-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.era-btn[data-era="${active}"]`)?.classList.add('active');
  }
});

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { renderSidebar(LIBRARY); renderLibrary(LIBRARY); return; }
  const filtered = LIBRARY.map(group => {
    const eraMatch = group.era.toLowerCase().includes(q) || group.folder.toLowerCase().includes(q);
    const videos = eraMatch ? group.videos
      : group.videos.filter(v => v.filename.toLowerCase().includes(q) || v.label.toLowerCase().includes(q));
    return videos.length ? {...group, videos, video_count: videos.length} : null;
  }).filter(Boolean);
  renderSidebar(filtered); renderLibrary(filtered);
});

// ── Descriptions ──────────────────────────────────────────────────────────────
const LS_KEY = 'family_film_descriptions';
function loadDescriptions() { try { return JSON.parse(localStorage.getItem(LS_KEY)||'{}'); } catch { return {}; } }
function saveDescriptions(d) { localStorage.setItem(LS_KEY, JSON.stringify(d)); }
function getDesc(folder) { return loadDescriptions()[folder] || ''; }
function setDesc(folder, text) {
  const all = loadDescriptions();
  if (text.trim()) all[folder] = text.trim(); else delete all[folder];
  saveDescriptions(all);
}
function populateDesc(folder) {
  const key = CSS.escape(folder);
  const text = getDesc(folder);
  const textEl = document.getElementById(`desc-text-${key}`);
  const phEl   = document.getElementById(`desc-placeholder-${key}`);
  if (!textEl) return;
  textEl.textContent   = text;
  textEl.style.display = text ? 'block' : 'none';
  phEl.style.display   = text ? 'none'  : 'flex';
}
function startEditDesc(enc) {
  const folder = decodeURIComponent(enc), key = CSS.escape(folder);
  document.getElementById(`desc-view-${key}`).classList.add('hidden');
  document.getElementById(`desc-edit-${key}`).classList.add('active');
  const ta = document.getElementById(`desc-ta-${key}`);
  ta.value = getDesc(folder); autoResize(ta); ta.focus();
}
function saveDesc(enc) {
  const folder = decodeURIComponent(enc), key = CSS.escape(folder);
  setDesc(folder, document.getElementById(`desc-ta-${key}`).value);
  populateDesc(folder);
  const flash = document.getElementById(`desc-flash-${key}`);
  flash.classList.add('show');
  setTimeout(() => { flash.classList.remove('show'); cancelEditDesc(enc); }, 1200);
}
function cancelEditDesc(enc) {
  const key = CSS.escape(decodeURIComponent(enc));
  document.getElementById(`desc-view-${key}`).classList.remove('hidden');
  document.getElementById(`desc-edit-${key}`).classList.remove('active');
}
function autoResize(ta) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }

// ── Export / import descriptions ──────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}
function exportDescriptions() {
  const all = loadDescriptions();
  if (!Object.keys(all).length) { showToast('No descriptions to export yet.'); return; }
  const blob = new Blob([JSON.stringify(all, null, 2)], {type:'application/json'});
  const a = Object.assign(document.createElement('a'), {href: URL.createObjectURL(blob), download:'descriptions.json'});
  a.click(); URL.revokeObjectURL(a.href);
  showToast(`✓ Exported ${Object.keys(all).length} descriptions`);
}
function importDescriptions(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const incoming = JSON.parse(e.target.result);
      saveDescriptions({...loadDescriptions(), ...incoming});
      LIBRARY.forEach(g => populateDesc(g.folder));
      showToast(`✓ Imported ${Object.keys(incoming).length} descriptions`);
    } catch { showToast('✗ Invalid JSON — import failed.'); }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ── Boot — render immediately, no auth needed ─────────────────────────────────
renderSidebar(LIBRARY);
renderLibrary(LIBRARY);
